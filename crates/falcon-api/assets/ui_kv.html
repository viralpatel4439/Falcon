<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Falcon KV Store</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e; --accent:#e3b341; --accent2:#bb8009; --ok:#3fb950; --err:#f85149; }
  *{box-sizing:border-box;} body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);}
  header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
  header .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:20px;}
  header h1{margin:0;font-size:18px;} header .tag{color:var(--muted);font-size:13px;}
  .badge{margin-left:auto;font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:4px 12px;}
  main{max-width:960px;margin:0 auto;padding:24px 28px;display:grid;gap:20px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .panel h2{margin:0 0 14px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  input,button{font:inherit;border-radius:8px;border:1px solid var(--border);}
  input{background:#0d1117;color:var(--fg);padding:9px 12px;flex:1;min-width:110px;} input:focus{outline:none;border-color:var(--accent);}
  button{background:var(--accent);color:#1a1400;border:none;padding:9px 16px;font-weight:600;cursor:pointer;} button.ghost{background:transparent;color:var(--fg);border:1px solid var(--border);} button:hover{filter:brightness(1.08);}
  .out{font-family:ui-monospace,Menlo,monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;min-height:20px;max-height:280px;overflow:auto;}
  .ok{color:var(--ok);} .err{color:var(--err);} .tick{color:var(--muted);}
</style>
</head>
<body>
<header>
  <div class="logo">🗄️</div>
  <div><h1>Falcon KV Store</h1><div class="tag">durable key-value store · real-time updates · multi-region</div></div>
  <div class="badge" id="nodeBadge">connecting…</div>
</header>
<main>
  <div class="panel">
    <h2>Write</h2>
    <div class="row">
      <input id="setKey" placeholder="key" />
      <input id="setVal" placeholder="value" />
      <input id="ttl" placeholder="ttl (s)" style="max-width:100px" />
      <button onclick="putKey()">Put</button>
    </div>
    <div class="out" id="setOut" style="margin-top:12px"></div>
  </div>
  <div class="panel">
    <h2>Read / scan</h2>
    <div class="row">
      <input id="getKey" placeholder="key (blank = scan by prefix)" />
      <input id="prefix" placeholder="prefix" style="max-width:160px" />
      <button onclick="getKey()">Get</button>
      <button class="ghost" onclick="scan()">Scan</button>
      <button class="ghost" onclick="delKey()">Delete</button>
    </div>
    <div class="out" id="getOut" style="margin-top:12px"></div>
  </div>
  <div class="panel">
    <h2>Live subscription <span class="tick" id="subState"></span></h2>
    <div class="row">
      <input id="subPrefix" placeholder="key prefix to watch (blank = all)" />
      <button onclick="subscribe()">Subscribe</button>
      <button class="ghost" onclick="document.getElementById('log').textContent=''">Clear</button>
    </div>
    <div class="out" id="log" style="margin-top:12px"></div>
  </div>
</main>
<script>
let apiKey=localStorage.getItem("falcon_key")||"";
function hdrs(json){const h={};if(json)h["Content-Type"]="application/json";if(apiKey)h["Authorization"]="Bearer "+apiKey;return h;}
async function refresh(){
  try{const h=await (await fetch("/health")).json();
    document.getElementById("nodeBadge").textContent=h.node_id+" · "+h.region+(h.replication_enabled?" · repl:"+(h.replication_role||"on"):"");
  }catch(e){document.getElementById("nodeBadge").textContent="offline";}
}
async function putKey(){
  const key=document.getElementById("setKey").value.trim(); if(!key) return;
  const val=document.getElementById("setVal").value; const ttl=document.getElementById("ttl").value.trim();
  const body=JSON.stringify(ttl?{key,value:val,ttl:Number(ttl)}:{key,value:val});
  const o=document.getElementById("setOut");
  let res=await fetch("/kv",{method:"POST",headers:hdrs(true),body});
  if(res.status===401){const k=prompt("API key:");if(k){apiKey=k;localStorage.setItem("falcon_key",k);return putKey();}}
  if(res.ok){o.innerHTML=`<span class="ok">written</span>`;}
  else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
async function getKey(){
  const key=document.getElementById("getKey").value.trim(); if(!key) return scan();
  const o=document.getElementById("getOut");
  let res=await fetch(`/kv?key=${encodeURIComponent(key)}`,{headers:hdrs()});
  if(res.status===401){const k=prompt("API key:");if(k){apiKey=k;localStorage.setItem("falcon_key",k);return getKey();}}
  if(res.status===404){o.innerHTML=`<span class="err">not found</span>`;return;}
  if(res.ok){const b=await res.json();o.textContent=b.value;} else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
async function scan(){
  const p=document.getElementById("prefix").value.trim(); const o=document.getElementById("getOut");
  let res=await fetch(`/kv/scan?prefix=${encodeURIComponent(p)}`,{headers:hdrs()});
  if(res.status===401){const k=prompt("API key:");if(k){apiKey=k;localStorage.setItem("falcon_key",k);return scan();}}
  if(res.ok){const b=await res.json();const it=b.items||[];o.textContent=it.length?it.map(i=>`${i.key}\t${i.value}`).join("\n"):"(no keys)";}
  else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
async function delKey(){
  const key=document.getElementById("getKey").value.trim(); if(!key) return;
  let res=await fetch(`/kv?key=${encodeURIComponent(key)}`,{method:"DELETE",headers:hdrs()});
  if(res.status===401){const k=prompt("API key:");if(k){apiKey=k;localStorage.setItem("falcon_key",k);return delKey();}}
  document.getElementById("getOut").innerHTML=res.ok?`<span class="ok">deleted</span>`:`<span class="err">error ${res.status}</span>`;
}
let ws=null;
function subscribe(){
  const p=document.getElementById("subPrefix").value.trim();
  if(ws)ws.close();
  const proto=location.protocol==="https:"?"wss":"ws";
  let url=`${proto}://${location.host}/subscribe?keyspace=default&`+(p?`prefix=${encodeURIComponent(p)}`:`prefix=`);
  if(apiKey)url+=`&api_key=${encodeURIComponent(apiKey)}`;
  ws=new WebSocket(url);
  const st=document.getElementById("subState");
  ws.onopen=()=>st.textContent="● live";
  ws.onclose=()=>st.textContent="○ closed";
  ws.onerror=()=>st.textContent="⚠ error";
  ws.onmessage=e=>{const l=document.getElementById("log");l.textContent=`${new Date().toLocaleTimeString()}  ${e.data}\n`+l.textContent;};
}
refresh(); setInterval(refresh,5000);
</script>
</body>
</html>
