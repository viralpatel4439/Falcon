<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Falcon Event Stream</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e; --accent:#3fb950; --accent2:#2ea043; --ok:#3fb950; --err:#f85149; }
  *{box-sizing:border-box;} body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);}
  header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
  header .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:20px;}
  header h1{margin:0;font-size:18px;} header .tag{color:var(--muted);font-size:13px;}
  .badge{margin-left:auto;font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:4px 12px;}
  main{max-width:960px;margin:0 auto;padding:24px 28px;display:grid;gap:20px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .panel h2{margin:0 0 14px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  input,button{font:inherit;border-radius:8px;border:1px solid var(--border);}
  input{background:#0d1117;color:var(--fg);padding:9px 12px;flex:1;min-width:100px;} input:focus{outline:none;border-color:var(--accent);}
  button{background:var(--accent);color:#04140a;border:none;padding:9px 16px;font-weight:600;cursor:pointer;} button:hover{filter:brightness(1.08);}
  .out{font-family:ui-monospace,Menlo,monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;min-height:20px;max-height:300px;overflow:auto;}
  .ok{color:var(--ok);} .err{color:var(--err);}
</style>
</head>
<body>
<header>
  <div class="logo">🌊</div>
  <div><h1>Falcon Event Stream</h1><div class="tag">partitioned, replayable logs · consumer groups</div></div>
  <div class="badge" id="nodeBadge">connecting…</div>
</header>
<main>
  <div class="panel"><h2>Streams</h2><div class="out" id="streams">loading…</div></div>
  <div class="panel">
    <h2>Append a record</h2>
    <div class="row">
      <input id="key" placeholder="key (optional, keeps same-key order)" style="max-width:260px" />
      <input id="payload" placeholder="record value" />
      <button onclick="append()">Append</button>
    </div>
    <div class="out" id="appendOut" style="margin-top:12px"></div>
  </div>
  <div class="panel">
    <h2>Read next records</h2>
    <div class="row">
      <button onclick="poll()">Read next</button>
    </div>
    <div class="out" id="pollOut" style="margin-top:12px"></div>
  </div>
</main>
<script>
let apiKey=localStorage.getItem("falcon_key")||"";
function hdrs(json){const h={};if(json)h["Content-Type"]="application/json";if(apiKey)h["Authorization"]="Bearer "+apiKey;return h;}
async function refresh(){
  try{const h=await (await fetch("/health")).json();
    document.getElementById("nodeBadge").textContent=h.node_id+" · "+h.region+(h.replication_enabled?" · repl":"");
    const s=h.streams||[]; document.getElementById("streams").textContent=s.length?s.join("\n"):"(no streams configured)";
  }catch(e){document.getElementById("nodeBadge").textContent="offline";}
}
async function append(){
  const k=document.getElementById("key").value.trim(); const p=document.getElementById("payload").value;
  const o=document.getElementById("appendOut");
  let res=await fetch("/stream",{method:"POST",headers:hdrs(true),body:JSON.stringify({key:k,value:p})});
  if(res.status===401){const kk=prompt("API key:");if(kk){apiKey=kk;localStorage.setItem("falcon_key",kk);return append();}}
  if(res.ok){o.innerHTML=`<span class="ok">appended</span>`;}
  else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
async function poll(){
  const o=document.getElementById("pollOut");
  let res=await fetch("/stream",{headers:hdrs()});
  if(res.status===401){const k=prompt("API key:");if(k){apiKey=k;localStorage.setItem("falcon_key",k);return poll();}}
  if(res.ok){const b=await res.json();const recs=b.items||[];
    o.textContent = recs.length ? recs.map(r=>r.value).join("\n") : "(no new records)";
  } else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
refresh(); setInterval(refresh,5000);
</script>
</body>
</html>
