<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Falcon Cache</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e; --accent:#f0883e; --accent2:#d2691e; --ok:#3fb950; --err:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:20px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  header .logo { width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:20px; }
  header h1 { margin:0; font-size:18px; } header .tag { color:var(--muted); font-size:13px; }
  .badge { margin-left:auto; font-size:12px; color:var(--muted); border:1px solid var(--border); border-radius:20px; padding:4px 12px; }
  main { max-width:960px; margin:0 auto; padding:24px 28px; display:grid; gap:20px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .panel h2 { margin:0 0 14px; font-size:14px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  input, button { font:inherit; border-radius:8px; border:1px solid var(--border); }
  input { background:#0d1117; color:var(--fg); padding:9px 12px; flex:1; min-width:120px; }
  input:focus { outline:none; border-color:var(--accent); }
  button { background:var(--accent); color:#1a1000; border:none; padding:9px 16px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--fg); border:1px solid var(--border); }
  button:hover { filter:brightness(1.08); }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .stat { background:#0d1117; border:1px solid var(--border); border-radius:10px; padding:14px; }
  .stat .k { color:var(--muted); font-size:12px; } .stat .v { font-size:22px; font-weight:700; margin-top:4px; }
  .out { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; white-space:pre-wrap; word-break:break-all; background:#0d1117; border:1px solid var(--border); border-radius:8px; padding:12px; min-height:20px; }
  .ok { color:var(--ok); } .err { color:var(--err); }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <div class="logo">⚡</div>
  <div><h1>Falcon Cache</h1><div class="tag">low-latency RAM cache · spills to disk · TTL</div></div>
  <div class="badge" id="nodeBadge">connecting…</div>
</header>
<main>
  <div class="panel">
    <h2>Cache stats</h2>
    <div class="stats" id="stats"><div class="stat"><div class="k">loading…</div><div class="v">—</div></div></div>
  </div>

  <div class="panel">
    <h2>Set a key</h2>
    <div class="row">
      <input id="setKey" placeholder="key" />
      <input id="setVal" placeholder="value" />
      <input id="setTtl" placeholder="ttl (secs, optional)" style="max-width:180px" />
      <button onclick="putKey()">Cache it</button>
    </div>
    <div class="out" id="setOut" style="margin-top:12px"></div>
  </div>

  <div class="panel">
    <h2>Get a key</h2>
    <div class="row">
      <input id="getKey" placeholder="key" />
      <button onclick="getKey()">Get</button>
      <button class="ghost" onclick="delKey()">Delete</button>
    </div>
    <div class="out" id="getOut" style="margin-top:12px"></div>
  </div>
</main>

<script>
const KS = "cache";
let apiKey = localStorage.getItem("falcon_key") || "";
function hdrs(json){ const h={}; if(json) h["Content-Type"]="text/plain"; if(apiKey) h["Authorization"]="Bearer "+apiKey; return h; }
async function ensureKey(res){ if(res.status===401){ const k=prompt("API key required:"); if(k){ apiKey=k; localStorage.setItem("falcon_key",k);} return true;} return false; }

async function refresh(){
  try{
    const r = await fetch("/health"); const h = await r.json();
    document.getElementById("nodeBadge").textContent = h.node_id+" · "+h.region+(h.replication_enabled?" · repl:"+(h.replication_role||"on"):"");
    const ks = (h.keyspaces||[]).find(k=>k.name===KS) || (h.keyspaces||[])[0] || {};
    const t = ks.tiering || {};
    const s = document.getElementById("stats");
    s.innerHTML = "";
    const tiles = [
      ["Tier", ks.tier || "—"],
      ["Hot keys", t.hot_keys ?? "—"],
      ["Hot bytes", t.hot_bytes ?? "—"],
      ["Hit rate", t.hot_hit_rate!=null ? (t.hot_hit_rate*100).toFixed(1)+"%" : "—"],
      ["Evictions", t.evictions ?? "—"],
      ["TTL keys", ks.ttl_tracked_keys ?? "—"],
    ];
    for(const [k,v] of tiles){ s.insertAdjacentHTML("beforeend", `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`); }
  }catch(e){ document.getElementById("nodeBadge").textContent="offline"; }
}

async function putKey(){
  const key=document.getElementById("setKey").value.trim(); if(!key) return;
  const val=document.getElementById("setVal").value;
  const ttl=document.getElementById("setTtl").value.trim();
  let url=`/keyspaces/${KS}/kv/${encodeURIComponent(key)}`; if(ttl) url+=`?ttl=${ttl}`;
  const o=document.getElementById("setOut");
  let res=await fetch(url,{method:"PUT",headers:hdrs(true),body:val});
  if(await ensureKey(res)) res=await fetch(url,{method:"PUT",headers:hdrs(true),body:val});
  if(res.ok){ const b=await res.json(); o.innerHTML=`<span class="ok">cached</span> · seq ${b.sequence}`; refresh(); }
  else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
async function getKey(){
  const key=document.getElementById("getKey").value.trim(); if(!key) return;
  const o=document.getElementById("getOut");
  let res=await fetch(`/keyspaces/${KS}/kv/${encodeURIComponent(key)}`,{headers:hdrs()});
  if(await ensureKey(res)) return getKey();
  if(res.status===404){ o.innerHTML=`<span class="err">miss</span> — not in cache`; return; }
  if(res.ok){ const b=await res.json(); o.innerHTML=`<span class="ok">hit</span>\n${b.value}`; }
  else o.innerHTML=`<span class="err">error ${res.status}</span>`;
}
async function delKey(){
  const key=document.getElementById("getKey").value.trim(); if(!key) return;
  let res=await fetch(`/keyspaces/${KS}/kv/${encodeURIComponent(key)}`,{method:"DELETE",headers:hdrs()});
  if(await ensureKey(res)) return delKey();
  document.getElementById("getOut").innerHTML = res.ok ? `<span class="ok">evicted</span>` : `<span class="err">error ${res.status}</span>`;
  refresh();
}
refresh(); setInterval(refresh, 4000);
</script>
</body>
</html>
