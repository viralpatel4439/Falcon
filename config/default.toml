# Example configuration for Falcon. All fields have built-in defaults,
# so running `falcon` with no --config at all also works out of the box
# (single node, warm tier, no replication, no subscriptions).

[node]
id = "node-1"
region = "us-east-1"

# Optional API key. When empty (default) auth is OFF everywhere and costs
# nothing. When set, EVERY connection must present the key — clients AND
# container-to-container replication:
#   HTTP:  Authorization: Bearer <key>   OR   ?api_key=<key>   (/healthz exempt)
#   WebSocket (/subscribe): ?api_key=<key>  (browsers can't set headers)
#   wire (binary):  an AUTH frame with the key, first, before any other op
#   gRPC replication:  authorization metadata = key
# NOTE: the ?api_key= query form is only as safe as the transport — use TLS so
# the URL isn't sniffable, and be aware URLs can appear in proxy/access logs.
# Prefer the Authorization header where the client can set it.
[auth]
api_key = ""                  # e.g. "change-me-to-a-long-random-secret"

[http]
bind = "0.0.0.0:8080"

[wire]
enabled = true               # fast binary protocol with pipelining
bind = "0.0.0.0:6380"

[replication]
enabled = false
role = "leader"            # "leader" or "follower"
grpc_bind = "0.0.0.0:7070"
leader_addr = ""            # required if role = "follower", e.g. "http://leader-host:7070"
peers = []                   # informational, for leader-side visibility only

[subscriptions]
enabled = false               # global default; override per keyspace below

# Storage location: if data_dir is unset it defaults to ./data (relative to
# the process working dir) — mount a Docker volume there and it "just works".
# Set data_dir to any path (local disk, mounted network/volume) to use that.
[storage]
data_dir = "./data"
default_tier = "warm"          # "hot" | "warm" | "cold" | "tiered" | "file-per-key" | "sharded"
max_value_bytes = 67108864     # 64 MiB anti-OOM cap on a single value/PUT body;
                               # a larger PUT is rejected with 413. 0 disables.

# Operational tuning for a long-lived, autoscaled single container. Everything
# here is ON by default with production-safe values; tune or disable as needed.
# Every field also has a built-in default, so this whole section is optional.
[ops]
metrics_enabled = true          # expose Prometheus metrics at /metrics
compaction_enabled = true       # background WAL compaction (bounds disk + replay)
compaction_interval_secs = 300  # how often to evaluate each keyspace for compaction
compaction_min_bytes = 67108864 # only compact a WAL once it exceeds this size (64 MiB)
shutdown_grace_secs = 25        # max seconds to drain + final-flush on SIGTERM

[[keyspace]]
name = "default"
tier = "warm"
subscriptions = true
replication = false
default_ttl_secs = 0       # 0 = keys never expire; >0 = auto-expire after N secs
                           # (per-write TTL via ?ttl=<secs> on PUT overrides this)
interval_fsync_ms = 0      # 0 = fsync every write (fully durable); >0 = fsync on
                           # this interval (faster, small crash-loss window)
write_mode = "single-leader"  # "single-leader" (default): one region writes,
                              # others replicate — strong ordering.
                              # "multi-leader": any region accepts writes,
                              # converging via HLC last-write-wins (eventual
                              # consistency; concurrent same-key writes resolve
                              # deterministically — one wins, no merge).
                              # Requires warm tier + replication = true; list
                              # peers under [replication].peers.

# Add more keyspaces as needed, e.g.:
# [[keyspace]]
# name = "sessions"
# tier = "hot"          # in-memory only, cannot be replicated
# subscriptions = false
# replication = false
#
# [[keyspace]]
# name = "profiles"
# tier = "cold"          # disk-backed (sled), good for large datasets
# subscriptions = true
# replication = true
#
# [[keyspace]]
# name = "blobs"
# tier = "file-per-key"  # each value is an independent file under data_dir
#                        # (one flat file per key, atomic write-rename). Simple,
#                        # portable, inspectable. PORTABILITY TIER, NOT A HOT
#                        # TIER: one I/O (or one billed request on a remote
#                        # bucket) PER KEY, no in-memory index. For hot or
#                        # cost-sensitive object storage use tier = "sharded"
#                        # (below) instead — it's the optimized object-store
#                        # engine (fixed object count, O(1) in-memory reads).
# subscriptions = false
# replication = false    # cannot be a replication LEADER (no ordered log)
#
# [[keyspace]]
# name = "catalog"
# tier = "sharded"       # keys are HASHED into a fixed set of buckets; each
#                        # bucket is ONE object in the backing store. So N
#                        # buckets = N objects no matter how many keys — the
#                        # cheap way to use a 3rd-party (request-billed) object
#                        # store, vs. file-per-key's one-object-per-key cost.
#                        # In-memory index gives O(1) point reads; prefix scans
#                        # sweep all buckets (hashing removes key locality).
# shard_buckets = 4096    # number of buckets (rounded up to a power of two)
# shard_flush_ms = 0      # 0 = flush the touched bucket every write (durable);
#                         # >0 = coalesce dirty buckets and flush on this interval
#                         # (far fewer object writes under load; bounded loss window)
# subscriptions = false
# replication = false     # cannot be a replication LEADER (no ordered log)
#
# [[keyspace]]
# name = "cache"
# tier = "tiered"        # automatic hot/cold: hot working set in RAM,
#                        # cold tail auto-spills to disk. Hold a dataset
#                        # far larger than RAM while serving hot keys fast.
# hot_capacity_mb = 512   # RAM budget for the hot cache (dataset may exceed this)
# evict_sample = 8        # CLOCK eviction sample size
# subscriptions = false
# replication = true      # allowed: tiered is durable via its disk store

# --- Messaging: pub/sub topics and work queues ---
#
# [[topic]]
# name = "events"
# mode = "ephemeral"     # "ephemeral" (fast, in-memory, at-most-once) or
#                        # "durable" (persisted, survives restart, replayable)
# capacity = 1024         # in-flight broadcast buffer per subscriber
#
# [[queue]]
# name = "jobs"
# ack_timeout_secs = 30   # unacked delivered messages are redelivered after this
#                         # (durable, at-least-once, competing consumers per group)
#
# --- Falcon Event Streaming: partitioned, replayable event logs ---
#
# A stream is the Kafka-shaped sibling of a topic: records are routed to
# PARTITIONS by key hash (records with the same key are totally ordered on one
# partition), each partition is a durable replayable log, and CONSUMER GROUPS
# keep a durable committed offset per partition so they resume where they left
# off (at-least-once). Different groups each see the full stream independently.
#
# [[stream]]
# name = "user-events"
# partitions = 1          # ordering domains / parallelism (min 1, default 1). A
#                         # key is always ordered within its partition. NOTE: on
#                         # a single disk each partition fsyncs independently, so
#                         # MORE partitions trade single-node write throughput
#                         # for parallel ordering (like Kafka). Raise when you
#                         # need parallel ordering domains or add disks/nodes.
# capacity = 1024         # live-tail broadcast buffer per partition
# interval_fsync_ms = 0   # 0 = fsync every append (zero acked-write loss).
#                         # >0 = coalesce fsyncs across partitions on this
#                         # interval: higher throughput at a bounded loss window
#                         # (same dial as the warm KV tier).
